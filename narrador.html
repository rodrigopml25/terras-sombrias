<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terras Sombrias — Narrador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="header">
      <div class="header-logo">Terras <span>Sombrias</span> (Narrador)</div>
      <div class="header-sep"></div>
      <div class="turn-pill">
        <i class="ti ti-hourglass"></i>
        Turno <strong id="turn-num">1</strong>
      </div>
      <div id="sync-status" style="font-size:11px; color:var(--text3); margin-left:10px;" title="Status da sincronização com o Jogador">○ Sem sincronização</div>
      <div class="header-actions">
        <button class="btn btn-success" onclick="nextTurnGlobal()"><i class="ti ti-arrow-right"></i> Próximo Turno</button>
        <button class="btn btn-danger" onclick="resetLuta()"><i class="ti ti-swords"></i> Reset Luta</button>
        <button class="btn" onclick="resetSessao()"><i class="ti ti-refresh"></i> Reset Sessão</button>
      </div>
    </header>

    <div class="view active" style="padding-top: 20px;">
      <div class="nar-layout">
        <div class="nar-players" id="nar-players"></div>
        <div class="nar-side">
          <div class="card">
            <div class="card-title"><i class="ti ti-swords"></i> Iniciativa <button class="btn" style="margin-left:auto;padding:3px 9px;font-size:11px" onclick="rollInit()">Rolar 1d20</button></div>
            <div class="init-list" id="init-list">
              <div style="font-size:12px;color:var(--text3);text-align:center;padding:10px">Clique em "Rolar 1d20" para iniciar</div>
            </div>
            <div class="init-btns" style="margin-top:8px">
              <button class="btn" onclick="prevI()"><i class="ti ti-chevron-left"></i> Anterior</button>
              <button class="btn" onclick="nextI()">Próximo <i class="ti ti-chevron-right"></i></button>
            </div>
          </div>
          <div class="card">
            <div class="card-title"><i class="ti ti-notes"></i> Anotações</div>
            <div class="ntags" id="ntags"></div>
            <textarea id="nota-area" placeholder="Notas da sessão..." oninput="saveNota()"></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-char-overlay">
      <div class="modal">
        <h3 id="modal-char-title">Editar Personagem</h3>
        <div class="form-row">
          <label class="form-label">Nome</label>
          <input type="text" id="c-name" placeholder="Nome do personagem">
        </div>

        <div style="display:flex; gap:10px;">
            <div class="form-row" style="flex:1">
              <label class="form-label">Raça</label>
              <input type="text" id="c-race" placeholder="Ex: Humano">
            </div>
            <div class="form-row" style="flex:1">
              <label class="form-label">Classe</label>
              <input type="text" id="c-cls" placeholder="Ex: Guerreiro">
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <div class="form-row" style="flex:1">
              <label class="form-label">Vida (HP máximo)</label>
              <input type="number" id="c-hp" value="30" style="width:100%; padding:6px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text);">
            </div>
            <div class="form-row" style="flex:1">
              <label class="form-label">Insanidade</label>
              <input type="number" id="c-ins" value="0" style="width:100%; padding:6px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text);">
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <div class="form-row" style="flex:1">
              <label class="form-label">Passos</label>
              <input type="number" id="c-passos" value="6" style="width:100%; padding:6px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text);">
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <div class="form-row" style="flex:1">
              <label class="form-label">AGI</label>
              <input type="number" id="c-agi" value="10" style="width:100%; padding:6px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text);">
            </div>
            <div class="form-row" style="flex:1">
              <label class="form-label">FOR</label>
              <input type="number" id="c-for" value="10" style="width:100%; padding:6px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text);">
            </div>
            <div class="form-row" style="flex:1">
              <label class="form-label">INT</label>
              <input type="number" id="c-int" value="10" style="width:100%; padding:6px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text);">
            </div>
        </div>

        <div class="modal-btns">
          <button class="btn" onclick="closeCharModal()">Cancelar</button>
          <button class="btn btn-primary" id="c-btn-save" onclick="saveCharacter()">Salvar</button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

    <script src="logica.js"></script>
  </body>
</html>
